<!doctype html>
<html lang="pl">
<head>
<meta charset="utf-8">
<title>Statystyki</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  background:#06121a;
  color:#fff;
  font-family:Arial;
  padding:20px;
}
.box{
  background:#111827;
  padding:15px;
  border-radius:10px;
  margin-bottom:10px;
}
canvas{
  background:#0f1720;
  border-radius:12px;
  padding:10px;
}
</style>
</head>

<body>

<h2>📊 Statystyki serwera</h2>

<div class="box">Online: <b id="online">0</b></div>
<div class="box">🔥 Peak ALL: <b id="peakAll">0</b></div>
<div class="box">⏱ Peak 24h: <b id="peak24">0</b></div>

<canvas id="chart"></canvas>

<script>
const ctx = document.getElementById("chart").getContext("2d");

/* gradient */
const gradient = ctx.createLinearGradient(0,0,0,400);
gradient.addColorStop(0,"rgba(255,76,76,0.5)");
gradient.addColorStop(1,"rgba(255,76,76,0)");

const chart = new Chart(ctx,{
  type:"line",
  data:{
    labels:[],
    datasets:[{
      label:"Gracze",
      data:[],
      borderWidth:3,
      tension:0.4,
      fill:true,
      backgroundColor:gradient,
      pointRadius:3
    }]
  },
  options:{
    animation:false,
    plugins:{
      legend:{labels:{color:"#fff"}}
    },
    scales:{
      x:{
        ticks:{
          color:"#aaa",
          maxTicksLimit:6,
          callback: (val, i, ticks) => {
            const label = chart.data.labels[val];
            return label ? label.slice(0,5) : "";
          }
        },
        grid:{color:"rgba(255,255,255,0.05)"}
      },
      y:{
        beginAtZero:true,
        ticks:{
          color:"#aaa",
          precision:0 // 🔥 usuwa 0.1, 1.0 itd.
        },
        grid:{color:"rgba(255,255,255,0.05)"}
      }
    }
  }
});

/* SKALA */
function niceScale(max){
  if(max <= 10) return {max:10, step:1};
  if(max <= 20) return {max:20, step:2};
  if(max <= 50) return {max:50, step:5};
  if(max <= 100) return {max:100, step:10};
  return {max:Math.ceil(max/50)*50, step:20};
}

async function load(){
  const res = await fetch("api.php");
  const data = await res.json();

  document.getElementById("online").textContent = data.online;
  document.getElementById("peakAll").textContent = data.peakAll;
  document.getElementById("peak24").textContent = data.peak24;

  const labels = data.history.map(p =>
    new Date(p.time * 1000).toLocaleTimeString("pl-PL", {
      hour: "2-digit",
      minute: "2-digit"
    })
  );

  const values = data.history.map(p => p.value);

  chart.data.labels = labels;
  chart.data.datasets[0].data = values;

  const max = Math.max(...values, 1);
  const scale = niceScale(max);

  chart.options.scales.y.max = scale.max;
  chart.options.scales.y.ticks.stepSize = scale.step;

  chart.update();
}

load();
setInterval(load, 30000);
</script>

</body>
</html>
