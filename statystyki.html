<!doctype html>
<html lang="pl">
<head>
<meta charset="utf-8">
<title>Statystyki</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{background:#06121a;color:#fff;font-family:Arial;padding:20px}
.box{background:#111827;padding:15px;border-radius:10px;margin-bottom:10px}
.online{color:#4CAF50}
</style>
</head>

<body>

<h2>Statystyki serwera</h2>

<div class="box">Online: <span id="online">0</span></div>
<div class="box">🔥 Peak ALL: <span id="peakAll">0</span></div>
<div class="box">⏱ Peak 24h: <span id="peak24">0</span></div>

<canvas id="chart"></canvas>

<script>
const ctx = document.getElementById("chart");

const chart = new Chart(ctx,{
  type:"line",
  data:{
    labels:[],
    datasets:[{
      label:"Gracze",
      data:[],
      borderWidth:2,
      tension:0.3
    }]
  },
  options:{animation:false}
});

async function load(){
  const res = await fetch("api.php");
  const data = await res.json();

  document.getElementById("online").textContent = data.online;
  document.getElementById("peakAll").textContent = data.peakAll;
  document.getElementById("peak24").textContent = data.peak24;

  chart.data.labels = data.history.map(p =>
    new Date(p.time*1000).toLocaleTimeString()
  );

  chart.data.datasets[0].data = data.history.map(p => p.value);

  chart.update();
}

load();
setInterval(load, 30000);
</script>

</body>
</html>
