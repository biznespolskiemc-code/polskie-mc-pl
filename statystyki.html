<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>POLSKIE-MC.PL | Statystyki</title>
  <meta name="description" content="Statystyki graczy na serwerze POLSKIE-MC.PL">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#0b1220;
      --accent:#FF4C4C;
      --muted:#9aa6b2;
      --card:#0f1720;
    }
    *{box-sizing:border-box}
    html,body{height:100%;margin:0;font-family:'Roboto',system-ui,-apple-system,Segoe UI,Roboto,Arial;color:#e6eef6}
    body{
      background: radial-gradient(1200px 600px at 10% 10%, rgba(255,76,76,0.06), transparent) no-repeat,
                  radial-gradient(900px 400px at 90% 90%, rgba(255,76,76,0.03), transparent) no-repeat,
                  linear-gradient(180deg,#06121a 0%, #071423 40%, #021018 100%);
      padding:24px;
    }
    .container{max-width:1100px;margin:0 auto}
    .card{
      background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
      border-radius:14px;
      padding:20px;
      box-shadow:0 8px 30px rgba(2,6,12,0.6);
      border:1px solid rgba(255,255,255,0.03);
      margin-bottom:18px;
    }
    .title{
      font-family:'Press Start 2P',monospace;
      font-size:18px;
      letter-spacing:1px;
      margin:0 0 8px 0;
    }
    .muted{color:var(--muted)}
    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:16px;
      flex-wrap:wrap;
      margin-bottom:18px;
    }
    a.btn{
      display:inline-block;
      background:linear-gradient(180deg, #FF6666, #CC0000);
      color:#fff;
      text-decoration:none;
      padding:10px 14px;
      border-radius:10px;
      font-weight:700;
      font-family:'Press Start 2P',monospace;
      font-size:12px;
    }
    .stats-row{
      display:grid;
      grid-template-columns:repeat(3, minmax(0,1fr));
      gap:12px;
      margin-bottom:18px;
    }
    .mini{
      padding:14px;
      border-radius:12px;
      background:rgba(255,255,255,0.03);
      border:1px solid rgba(255,255,255,0.04);
    }
    .mini .label{font-size:12px;color:var(--muted);margin-bottom:6px}
    .mini .value{font-size:22px;font-weight:800}
    .status-online{color:#4CAF50}
    .status-offline{color:#FF4C4C}
    canvas{
      width:100% !important;
      height:420px !important;
      background:rgba(255,255,255,0.02);
      border-radius:14px;
      padding:12px;
    }
    @media (max-width:720px){
      .stats-row{grid-template-columns:1fr}
      canvas{height:320px !important}
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="topbar">
      <div>
        <h1 class="title">STATYSTYKI SERWERA</h1>
        <div class="muted">Odświeżanie co 30 sekund</div>
      </div>
      <a class="btn" href="index.html">WSTECZ</a>
    </div>

    <div class="stats-row">
      <div class="mini">
        <div class="label">Status</div>
        <div id="status" class="value status-online">Ładowanie...</div>
      </div>
      <div class="mini">
        <div class="label">Gracze online</div>
        <div id="online" class="value">—</div>
      </div>
      <div class="mini">
        <div class="label">Maksymalnie</div>
        <div id="max" class="value">—</div>
      </div>
    </div>

    <div class="card">
      <canvas id="chart"></canvas>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script>
    const SERVER_IP = 'POLSKIE-MC.PL';
    const statusEl = document.getElementById('status');
    const onlineEl = document.getElementById('online');
    const maxEl = document.getElementById('max');

    const labels = [];
    const dataPoints = [];

    const ctx = document.getElementById('chart').getContext('2d');
    const chart = new Chart(ctx, {
      type: 'line',
      data: {
        labels,
        datasets: [{
          label: 'Gracze online',
          data: dataPoints,
          borderWidth: 3,
          tension: 0.35,
          pointRadius: 3,
          pointHoverRadius: 5,
          fill: true
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        animation: false,
        plugins: {
          legend: {
            labels: { color: '#e6eef6' }
          }
        },
        scales: {
          x: {
            ticks: { color: '#9aa6b2' },
            grid: { color: 'rgba(255,255,255,0.05)' }
          },
          y: {
            beginAtZero: true,
            ticks: { color: '#9aa6b2', precision: 0 },
            grid: { color: 'rgba(255,255,255,0.05)' }
          }
        }
      }
    });

    function pushPoint(value) {
      const now = new Date();
      const label = now.toLocaleTimeString('pl-PL', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
      labels.push(label);
      dataPoints.push(value);

      if (labels.length > 24) {
        labels.shift();
        dataPoints.shift();
      }

      chart.update();
    }

    async function updateStats() {
      try {
        const response = await fetch(`https://api.mcsrvstat.us/3/${SERVER_IP}`);
        const data = await response.json();

        if (data.online) {
          statusEl.textContent = 'ONLINE';
          statusEl.className = 'value status-online';
          onlineEl.textContent = data.players?.online ?? 0;
          maxEl.textContent = data.players?.max ?? '—';
          pushPoint(data.players?.online ?? 0);
        } else {
          statusEl.textContent = 'OFFLINE';
          statusEl.className = 'value status-offline';
          onlineEl.textContent = '0';
          maxEl.textContent = data.players?.max ?? '—';
          pushPoint(0);
        }
      } catch (e) {
        console.error(e);
        statusEl.textContent = 'BŁĄD';
        statusEl.className = 'value status-offline';
        onlineEl.textContent = '—';
        maxEl.textContent = '—';
      }
    }

    updateStats();
    setInterval(updateStats, 30000);
  </script>
</body>
</html>
